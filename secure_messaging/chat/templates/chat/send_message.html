{% extends 'chat/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10">
    <div class="bg-white rounded-xl shadow-md border border-gray-100 p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Compose Secure Message</h2>
        
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label for="receiver" class="block text-sm font-medium text-gray-700 mb-2">Recipient</label>
                <select name="receiver" id="receiver" required 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition bg-white text-gray-700">
                    <option value="" disabled selected>Select a user to message...</option>
                    {% for user in users %}
                        <option value="{{ user.id }}">@{{ user.username }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label for="content" class="block text-sm font-medium text-gray-700 mb-2">Message</label>
                <textarea name="content" id="content" rows="6" required placeholder="Type your secret message here..."
                          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition resize-none text-gray-700"></textarea>
                <p class="mt-2 text-xs text-gray-500">This message will be signed with an HMAC-SHA256 signature upon sending.</p>
            </div>
            
            <div class="pt-4">
                <button type="submit" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition flex justify-center items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    Send Securely
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
